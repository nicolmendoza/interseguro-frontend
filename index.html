<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interseguro QR Challenge</title>
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <div class="panel input-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Matriz de entrada</p>
              <h1>Factorizacion QR</h1>
            </div>
            <button id="sampleButton" class="icon-button" type="button" title="Cargar ejemplo" data-testid="sample-button">↻</button>
          </div>

          <div class="matrix-controls" aria-label="Tamano de matriz">
            <label>
              Filas
              <input id="rowCount" type="number" min="1" max="8" value="3" data-testid="row-count" />
            </label>
            <label>
              Columnas
              <input id="columnCount" type="number" min="1" max="8" value="3" data-testid="column-count" />
            </label>
          </div>

          <div id="matrixGrid" class="matrix-grid" data-testid="matrix-grid"></div>

          <button id="processButton" class="primary-action" type="button" data-testid="process-button">Procesar matriz</button>

          <p id="status" class="status" data-testid="status">Listo para enviar consultas.</p>
        </div>

        <div class="panel result-panel">
          <div class="panel-header compact">
            <div>
              <p class="eyebrow">Resultados</p>
              <h2>APIs protegidas con JWT</h2>
            </div>
          </div>

          <div class="result-grid">
            <article>
              <h3>Q - Go API</h3>
              <pre id="qOutput" data-testid="q-output">[]</pre>
            </article>
            <article>
              <h3>R - Go API</h3>
              <pre id="rOutput" data-testid="r-output">[]</pre>
            </article>
            <article>
              <h3>Estadisticas - Node API</h3>
              <pre id="statsOutput" data-testid="stats-output">{}</pre>
            </article>
            <article>
              <h3>Rotacion - Extra del enunciado</h3>
              <pre id="rotatedOutput" data-testid="rotated-output">[]</pre>
            </article>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
